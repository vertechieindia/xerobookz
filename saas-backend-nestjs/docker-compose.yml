version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: xerobookz-postgres
    environment:
      POSTGRES_USER: xerobookz
      POSTGRES_PASSWORD: xerobookz_dev
      POSTGRES_DB: xerobookz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xerobookz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Platform Core Services
  auth-service:
    build:
      context: ./platform-core/auth-service
      dockerfile: Dockerfile
    container_name: xerobookz-auth-service
    environment:
      DATABASE_URL: postgresql://xerobookz:xerobookz_dev@postgres:5432/xerobookz_auth?schema=public
      PORT: 9001
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 1d
      REFRESH_TOKEN_SECRET: your-super-secret-refresh-key-change-in-production
      REFRESH_TOKEN_EXPIRES_IN: 7d
      NODE_ENV: development
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "9001:9001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./platform-core/auth-service:/app
      - /app/node_modules

  # Website Services
  website-builder-service:
    build:
      context: ./website/website-builder-service
      dockerfile: Dockerfile
    container_name: xerobookz-website-builder-service
    environment:
      DATABASE_URL: postgresql://xerobookz:xerobookz_dev@postgres:5432/xerobookz_website?schema=public
      PORT: 9101
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NODE_ENV: development
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "9101:9101"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./website/website-builder-service:/app
      - /app/node_modules

  # Sales Services
  crm-service:
